<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Solar IV Report Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f4f6f8; color: #333; min-height: 100vh; }

  header {
    background: #76bf43;
    color: white;
    padding: 18px 32px;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header span { font-size: 26px; }

  .container { max-width: 720px; margin: 40px auto; padding: 0 16px; }

  .card {
    background: white;
    border-radius: 10px;
    padding: 32px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    margin-bottom: 24px;
  }
  .card h2 { font-size: 16px; color: #76bf43; margin-bottom: 20px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

  .upload-row { display: flex; flex-direction: column; gap: 16px; }

  .upload-box {
    border: 2px dashed #ddd;
    border-radius: 8px;
    padding: 22px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }
  .upload-box:hover { border-color: #76bf43; background: #f6fff0; }
  .upload-box.filled { border-color: #4CAF50; background: #f6fff6; }
  .upload-box input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .upload-box .icon { font-size: 28px; margin-bottom: 6px; }
  .upload-box .label { font-size: 14px; color: #666; }
  .upload-box .filename { font-size: 13px; color: #4CAF50; font-weight: 600; margin-top: 4px; }

  .btn {
    width: 100%;
    padding: 14px;
    background: #76bf43;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    margin-top: 8px;
  }
  .btn:hover:not(:disabled) { background: #5ea032; }
  .btn:disabled { background: #ccc; cursor: not-allowed; }

  .progress-wrap { display: none; margin-top: 20px; }
  .progress-label { font-size: 13px; color: #555; margin-bottom: 6px; }
  .progress-bar-bg { background: #eee; border-radius: 20px; height: 10px; overflow: hidden; }
  .progress-bar { height: 10px; background: #76bf43; border-radius: 20px; width: 0%; transition: width 0.2s; }
  .progress-count { font-size: 12px; color: #888; margin-top: 4px; text-align: right; }

  .result-box {
    display: none;
    background: #f0fff4;
    border: 1px solid #4CAF50;
    border-radius: 8px;
    padding: 20px;
    text-align: center;
    margin-top: 20px;
  }
  .result-box .check { font-size: 36px; }
  .result-box p { color: #2e7d32; font-weight: 600; margin: 8px 0 16px; }
  .dl-btn {
    display: inline-block;
    padding: 12px 28px;
    background: #2e7d32;
    color: white;
    border-radius: 8px;
    font-weight: 600;
    text-decoration: none;
    font-size: 15px;
    cursor: pointer;
    border: none;
    transition: background 0.2s;
  }
  .dl-btn:hover { background: #1b5e20; }

  .note { font-size: 12px; color: #999; margin-top: 12px; }
</style>
</head>
<body>

<header>
  <span>☀️</span> Solar IV Report Generator
</header>

<div class="container">
  <div class="card">
    <h2>Upload CSV Data File</h2>
    <div class="upload-row">

      <div class="upload-box" id="box-csv">
        <input type="file" accept=".csv,.CSV,.txt" id="inp-csv"/>
        <div class="icon">📄</div>
        <div class="label">Click to upload <strong>CSV data file</strong></div>
        <div class="filename" id="name-csv"></div>
      </div>

    </div>

    <button class="btn" id="gen-btn" disabled>Generate PDFs &amp; Download ZIP</button>

    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-label">Generating PDFs…</div>
      <div class="progress-bar-bg"><div class="progress-bar" id="progress-bar"></div></div>
      <div class="progress-count" id="progress-count"></div>
    </div>

    <div class="result-box" id="result-box">
      <div class="check">✅</div>
      <p id="result-msg"></p>
    </div>

  </div>
</div>

// Convert SVG data URL → PNG via Blob URL (avoids browser security blocks on data: SVGs in canvas)
function svgToPng(svgDataUrl, width, height) {
  return new Promise((resolve) => {
    const svgStr = atob(svgDataUrl.split(',')[1]);
    const blob = new Blob([svgStr], { type: 'image/svg+xml' });
    const blobUrl = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      URL.revokeObjectURL(blobUrl);
      resolve(canvas.toDataURL('image/png'));
    };
    img.onerror = () => { URL.revokeObjectURL(blobUrl); resolve(null); };
    img.src = blobUrl;
  });
}

// Pre-convert Grew Solar SVG → PNG at page load
svgToPng(GREW_LOGO, 632, 271).then(png => { logo1DataUrl = png || GREW_LOGO; });

function readFileAsText(file) {
  return new Promise(res => {
    const r = new FileReader();
    r.onload = e => res(e.target.result);
    r.readAsText(file);
  });
}

function checkReady() {
  document.getElementById('gen-btn').disabled = !csvData;
}

// CSV
document.getElementById('inp-csv').addEventListener('change', async e => {
  const f = e.target.files[0]; if (!f) return;
  const text = await readFileAsText(f);
  const result = Papa.parse(text, { header: true, skipEmptyLines: true });
  csvData = result.data.filter(r => r.DUTSerial && !r.DUTSerial.startsWith('CAL') && !r.DUTSerial.startsWith('DUMMY'));
  document.getElementById('name-csv').textContent = `✓ ${f.name} (${csvData.length} modules)`;
  document.getElementById('box-csv').classList.add('filled');
  checkReady();
});


// ── IV Curve ─────────────────────────────────────────────────────────────────
function sanitize(v, fallback) {
  const n = parseFloat(v);
  return (isFinite(n) && !isNaN(n)) ? n : fallback;
}

function generateIV(IscRaw, VocRaw, ImpRaw, VmpRaw, RshRaw, n = 300) {
  const Isc = Math.max(sanitize(IscRaw, 0), 0);
  const Voc = Math.max(sanitize(VocRaw, 0), 0);
  const Imp = Math.max(sanitize(ImpRaw, 0), 0);
  const Vmp = Math.max(sanitize(VmpRaw, 0), 0);
  const Rsh = Math.max(sanitize(RshRaw, 1000), 0.001);

  // degenerate module — return flat zero curve
  if (Isc <= 0 || Voc <= 0) {
    const V = Array.from({length: n}, (_, i) => (i / (n-1)));
    return { V, I: V.map(() => 0), P: V.map(() => 0) };
  }

  const Isceff = Math.max(Isc - Voc / Rsh, Isc * 0.99);
  const ratio = Math.min(Math.max(1.0 - Imp / Math.max(Isceff, 1e-9), 1e-9), 1 - 1e-9);
  const logR = Math.log(ratio);
  const nVt = (logR === 0) ? 1e-9 : (Vmp - Voc) / logR;
  const V = [], I = [], P = [];
  for (let i = 0; i < n; i++) {
    const v = (Voc * i) / (n - 1);
    const expVal = (v - Voc) / nVt;
    const cur = isFinite(expVal)
      ? Math.max(0, Math.min(Isc, Isceff * (1 - Math.exp(expVal))))
      : (i === 0 ? Isc : 0);
    V.push(v); I.push(cur); P.push(v * cur);
  }
  return { V, I, P };
}

function fmt(v) {
  const n = parseFloat(v);
  return (isFinite(n) && !isNaN(n)) ? n.toFixed(3) : String(v ?? '—');
}

// ── Draw one PDF page ────────────────────────────────────────────────────────
function generatePDF(row) {
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });
  const W = 210, H = 297;
  const margin = 14;
  const contentW = W - 2 * margin;

  // ── Logo area ──────────────────────────────────────────────────────────────
  if (logo1DataUrl) {
    doc.addImage(logo1DataUrl, margin, 6, 52, 22, '', 'FAST');
  } else {
    doc.setFontSize(20); doc.setFont('helvetica', 'bold');
    doc.setTextColor(34, 34, 34); doc.text('Gr', margin, 20);
    const grW = doc.getTextWidth('Gr');
    doc.setTextColor(93, 187, 99); doc.text('ew', margin + grW, 20);
    doc.setFontSize(10); doc.setFont('helvetica', 'italic');
    doc.setTextColor(120, 120, 120); doc.text('solar', margin + 1, 26);
  }

  if (logo2DataUrl) {
    doc.addImage(logo2DataUrl, W - margin - 26, 6, 26, 22, '', 'FAST');
  } else {
    const cx = W - margin - 14, cy = 16;
    const dotR = 1.1;
    const dotGrid = [
      [1,0],[2,0],
      [0,1],[1,1],[2,1],
      [0,2],[1,2],[2,2],[3,2],
      [0,3],[1,3],[2,3],
    ];
    const pinks = ['#E91E63','#F48FB1','#C2185B','#E91E63','#F06292',
                   '#880E4F','#D81B60','#E91E63','#F48FB1','#C2185B','#AD1457','#E91E63'];
    dotGrid.forEach(([dx, dy], i) => {
      const hex = pinks[i];
      const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
      doc.setFillColor(r, g, b);
      doc.circle(cx + dx * 3.5 - 5, cy + dy * 3.5 - 7, dotR, 'F');
    });
    doc.setFontSize(9); doc.setFont('helvetica', 'normal');
    doc.setTextColor(80,80,80);
    doc.text('Avalon', W - margin - 22, 26);
    doc.setFontSize(7); doc.setFont('helvetica', 'italic');
    doc.text('ST', W - margin - 7, 26);
  }

  // divider
  doc.setDrawColor(200,200,200); doc.setLineWidth(0.3);
  doc.line(margin, 32, W - margin, 32);

  // ── Table ──────────────────────────────────────────────────────────────────
  const tableY = 36;
  const colW = contentW / 2;
  const rowH = 7.2;
  const HEADER = [118, 191, 67];  // #76bf43 Grew Solar green

  const dutTKey  = Object.keys(row).find(k => k.includes('DUT T'));
  const ambTKey  = Object.keys(row).find(k => k.includes('Ambient T'));
  const monTKey  = Object.keys(row).find(k => k.includes('Monitor T'));

  const params = [
    ['Date and Time',   row['Date Time'] || ''],
    ['DUTSerial',       row['DUTSerial'] || ''],
    ['Isc[A]',          fmt(row['Isc [A]'])],
    ['Voc[V]',          fmt(row['Voc [V]'])],
    ['PMax [W]',        fmt(row['PMax [W]'])],
    ['Imp [A]',         fmt(row['Imp [A]'])],
    ['Vmp [V]',         fmt(row['Vmp [V]'])],
    ['Rshunt [ohm]',    fmt(row['Rshunt [ohm]'])],
    ['Rser [ohm]',      fmt(row['Rser [ohm]'])],
    ['FF [%]',          fmt(row['FF [%]'])],
    ['Efficiency [%]',  fmt(row['Efficiency [%]'])],
    ['DUT T. [°C]',     fmt(row[dutTKey])],
    ['Ambient T. [°C]', fmt(row[ambTKey])],
    ['Monitor T. [°C]', fmt(row[monTKey])],
    ['Avg Irr. [W/m2]', fmt(row['Avg Irr. [W/m2]'])],
  ];

  // header row
  doc.setFillColor(...HEADER);
  doc.rect(margin, tableY, colW, rowH, 'F');
  doc.rect(margin + colW, tableY, colW, rowH, 'F');
  doc.setFontSize(9); doc.setFont('helvetica', 'bold'); doc.setTextColor(255,255,255);
  doc.text('Parameters', margin + colW / 2, tableY + rowH * 0.65, { align: 'center' });
  doc.text('Results',    margin + colW + colW / 2, tableY + rowH * 0.65, { align: 'center' });

  params.forEach(([label, value], i) => {
    const y = tableY + (i + 1) * rowH;
    const bg = i % 2 === 0 ? [255,255,255] : [242,242,242];
    doc.setFillColor(...bg);
    doc.rect(margin, y, colW, rowH, 'F');
    doc.rect(margin + colW, y, colW, rowH, 'F');
    doc.setDrawColor(200,200,200); doc.setLineWidth(0.2);
    doc.rect(margin, y, colW, rowH, 'S');
    doc.rect(margin + colW, y, colW, rowH, 'S');
    doc.setFontSize(8.5); doc.setFont('helvetica', 'normal'); doc.setTextColor(40,40,40);
    doc.text(label, margin + 2, y + rowH * 0.65);
    doc.text(String(value), margin + colW + 2, y + rowH * 0.65);
  });

  // ── Chart ──────────────────────────────────────────────────────────────────
  const Isc  = sanitize(row['Isc [A]'],  0);
  const Voc  = sanitize(row['Voc [V]'],  0);
  const Imp  = sanitize(row['Imp [A]'],  0);
  const Vmp  = sanitize(row['Vmp [V]'],  0);
  const Rsh  = sanitize(row['Rshunt [ohm]'], 1000);
  const PMax = sanitize(row['PMax [W]'], 0);

  const { V, I, P } = generateIV(Isc, Voc, Imp, Vmp, Rsh);

  const chartX = margin;
  const chartY = tableY + (params.length + 1) * rowH + 8;
  const chartW = contentW;
  const chartH = H - chartY - margin;

  const padL = 16, padR = 16, padT = 6, padB = 14;
  const plotX = chartX + padL;
  const plotY = chartY + padT;
  const plotW = chartW - padL - padR;
  const plotH = chartH - padT - padB;

  // ── Nice tick algorithm ───────────────────────────────────────────────────
  function niceTicks(maxVal) {
    if (!isFinite(maxVal) || maxVal <= 0) maxVal = 1;
    const rough = maxVal / 5;
    const mag = Math.pow(10, Math.floor(Math.log10(rough)));
    const norm = rough / mag;
    const nice = norm <= 1 ? 1 : norm <= 2 ? 2 : norm <= 5 ? 5 : 10;
    const interval = nice * mag;
    const axisMax = Math.ceil(maxVal / interval) * interval;
    const ticks = [];
    for (let t = 0; t <= axisMax + interval * 1e-6; t += interval)
      ticks.push(Math.round(t * 1e9) / 1e9);
    return { ticks, axisMax };
  }

  const rawMaxV = (isFinite(Voc)  && Voc  > 0) ? Voc  * 1.02 : 60;
  const rawMaxI = (isFinite(Isc)  && Isc  > 0) ? Isc  * 1.15 : 20;
  const rawMaxP = (isFinite(PMax) && PMax > 0) ? PMax * 1.15 : 600;

  const axV = niceTicks(rawMaxV);
  const axI = niceTicks(rawMaxI);
  const axP = niceTicks(rawMaxP);

  const maxV = axV.axisMax;
  const maxI = axI.axisMax;
  const maxP = axP.axisMax;

  function toPlotX(v)  { return plotX + (v / maxV) * plotW; }
  function toPlotIY(i) { return plotY + plotH - (i / maxI) * plotH; }
  function toPlotPY(p) { return plotY + plotH - (p / maxP) * plotH; }

  function safeLine(doc, x1, y1, x2, y2) {
    if ([x1,y1,x2,y2].every(isFinite)) doc.line(x1, y1, x2, y2);
  }

  // axes background
  doc.setFillColor(250, 250, 250);
  doc.rect(plotX, plotY, plotW, plotH, 'F');
  doc.setDrawColor(180, 180, 180); doc.setLineWidth(0.2);
  doc.rect(plotX, plotY, plotW, plotH, 'S');

  // grid lines — one per tick
  doc.setDrawColor(210, 210, 210); doc.setLineWidth(0.15);
  axV.ticks.slice(1).forEach(v => {
    const gx = toPlotX(v);
    safeLine(doc, gx, plotY, gx, plotY + plotH);
  });
  axI.ticks.slice(1).forEach(iv => {
    const gy = toPlotIY(iv);
    safeLine(doc, plotX, gy, plotX + plotW, gy);
  });

  // P-V curve (green)
  doc.setDrawColor(46, 125, 50); doc.setLineWidth(0.7);
  for (let i = 1; i < V.length; i++)
    safeLine(doc, toPlotX(V[i-1]), toPlotPY(P[i-1]), toPlotX(V[i]), toPlotPY(P[i]));

  // I-V curve (blue)
  doc.setDrawColor(26, 87, 153); doc.setLineWidth(0.7);
  for (let i = 1; i < V.length; i++)
    safeLine(doc, toPlotX(V[i-1]), toPlotIY(I[i-1]), toPlotX(V[i]), toPlotIY(I[i]));

  // X axis labels
  doc.setFontSize(6.5); doc.setFont('helvetica', 'normal'); doc.setTextColor(80, 80, 80);
  axV.ticks.forEach(v => {
    doc.text(String(v % 1 === 0 ? v : v.toFixed(1)),
      toPlotX(v), plotY + plotH + 4.5, { align: 'center' });
  });

  // I axis labels (left, blue)
  doc.setTextColor(26, 87, 153);
  axI.ticks.forEach(iv => {
    doc.text(String(iv % 1 === 0 ? iv : iv.toFixed(1)),
      plotX - 1.5, toPlotIY(iv) + 1, { align: 'right' });
  });

  // P axis labels (right, green)
  doc.setTextColor(46, 125, 50);
  axP.ticks.forEach(pv => {
    doc.text(String(pv % 1 === 0 ? pv : pv.toFixed(0)),
      plotX + plotW + 1.5, toPlotPY(pv) + 1, { align: 'left' });
  });

  // Axis titles
  doc.setFontSize(8); doc.setTextColor(60, 60, 60);
  doc.text('Voltage [V]', plotX + plotW / 2, plotY + plotH + 10, { align: 'center' });

  doc.setTextColor(26, 87, 153);
  doc.saveGraphicsState();
  doc.text('I [A]', chartX + 4, plotY + plotH / 2, { angle: 90, align: 'center' });
  doc.restoreGraphicsState();

  doc.setTextColor(46, 125, 50);
  doc.saveGraphicsState();
  doc.text('Power [W]', W - margin + 1, plotY + plotH / 2, { angle: 270, align: 'center' });
  doc.restoreGraphicsState();

  return doc;
}

// ── Helpers ───────────────────────────────────────────────────────────────────
const BATCH_SIZE = 200; // PDFs per ZIP file — safe memory limit per batch

function triggerDownload(blob, filename) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 2000);
}

function setProgress(done, total, label) {
  const pct = Math.round((done / total) * 100);
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-count').textContent = label;
}

// ── Generate button ──────────────────────────────────────────────────────────
document.getElementById('gen-btn').addEventListener('click', async () => {
  if (!csvData) return;
  while (!logo1DataUrl) await new Promise(r => setTimeout(r, 50));

  const total = csvData.length;
  const totalBatches = Math.ceil(total / BATCH_SIZE);

  document.getElementById('progress-wrap').style.display = 'block';
  document.getElementById('result-box').style.display = 'none';
  document.getElementById('gen-btn').disabled = true;

  let globalDone = 0;

  for (let b = 0; b < totalBatches; b++) {
    const start = b * BATCH_SIZE;
    const end = Math.min(start + BATCH_SIZE, total);
    const batchRows = csvData.slice(start, end);
    const zip = new JSZip();

    for (let j = 0; j < batchRows.length; j++) {
      const row = batchRows[j];
      const serial = (row.DUTSerial || `module_${start + j + 1}`).replace(/[\/\\.\\s<>:"|?*]/g, '_').replace(/_+/g, '_').replace(/^_|_$/g, '');
      const doc = generatePDF(row);
      zip.file(`${serial}.pdf`, doc.output('arraybuffer'));

      globalDone++;
      setProgress(globalDone, total,
        totalBatches > 1
          ? `${globalDone} / ${total} — batch ${b + 1} of ${totalBatches}`
          : `${globalDone} / ${total}`
      );
      await new Promise(r => setTimeout(r, 0));
    }

    const zipBlob = await zip.generateAsync({ type: 'blob' });
    const zipName = totalBatches > 1
      ? `solar_iv_reports_part${b + 1}_of_${totalBatches}.zip`
      : 'solar_iv_reports.zip';

    triggerDownload(zipBlob, zipName);

    // let browser GC the zip before next batch
    await new Promise(r => setTimeout(r, 300));
  }

  document.getElementById('result-msg').textContent =
    totalBatches > 1
      ? `${total} PDFs done — downloaded in ${totalBatches} ZIP files`
      : `${total} PDF${total > 1 ? 's' : ''} ready — ZIP downloaded`;
  document.getElementById('result-box').style.display = 'block';
  document.getElementById('gen-btn').disabled = false;
});
</script>
